<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Noub Merger V7.0</title>
    <link rel="stylesheet" href="style.css">
    <!-- Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <!-- TOP: resources -->
    <div class="holy-bar">
        <div class="icon-btn" onclick="UI.toggle('wallet-scr', true)">👛</div>
        <div class="icon-btn diamond-btn" onclick="UI.toggle('diamond-scr', true)">💎 الماسة</div>
        <div id="v-btn" class="icon-btn" onclick="UI.toggle('vault-scr', true)">📦 <div class="badge" id="v-badge">0</div></div>
        <div class="icon-btn" onclick="tg.showAlert('لوحة الصدارة قريباً')">🏆 <div class="badge" id="lvl-badge">1</div></div>
    </div>

    <div class="rank-label">الرتبة: <b id="rank-name">NOBLE</b><div id="lvl-fill"></div></div>

    <!-- GAME ZONE -->
    <div class="game-zone">
        <div id="blast-layer" class="blast"></div>
        <div class="grid" id="grid"></div>
    </div>

    <!-- CONTROL BAR -->
    <div class="control-bar">
        <div class="btn-util" id="fc-btn" onclick="Engine.fastCharge()">⚡<div class="badge" id="fc-badge">10</div></div>
        <div class="btn-util" onclick="Engine.useBomb()">💣<div class="badge" id="b-badge">2</div></div>
        <div class="btn-util" id="j-inv" onpointerdown="UI.startDrag(event, null, 'joker')">🃏<div class="badge" id="j-badge">0</div></div>
        <div class="btn-util" id="auto-btn" onclick="UI.toggleAuto()">🪄</div>
        <div class="btn-util" id="trash-bin">🗑️</div>
    </div>

    <div class="energy-meta">
        <div class="energy-text"><span id="timer-txt">شحن...</span> <span id="energy-val">60/60 ⚡</span></div>
        <div class="energy-bg"><div id="energy-fill"></div></div>
    </div>

    <div class="footer"><button id="spawn-btn" class="btn-spawn" onclick="Engine.spawnCard()">إنشاء كارت (⚡1)</button></div>

    <!-- MODALS -->
    <div id="vault-scr" class="overlay">
        <h2>الخزنة الملكية</h2>
        <div class="vault-grid" id="vault-grid"></div>
        <button id="return-btn" class="btn-spawn" style="display:none; background:var(--gold); color:#000; margin-top:20px" onclick="Engine.returnFromVault()">إرجاع للشبكة</button>
        <button class="btn-spawn" style="width:150px; background:#444; margin-top:20px" onclick="UI.toggle('vault-scr', false)">إغلاق</button>
    </div>

    <div id="diamond-scr" class="overlay">
        <h2>الماسة الملكية</h2>
        <div class="diamond-svg-container"><svg viewBox="0 0 100 100" id="diamond-svg"></svg></div>
        <button class="btn-spawn" style="width:150px" onclick="UI.toggle('diamond-scr', false)">العودة</button>
    </div>

    <div id="wallet-scr" class="overlay">
        <h2>المحفظة والذهب</h2>
        <div class="wallet-card">
            <p>الذهب: <b id="gold-txt" style="font-size:24px">600</b> 💰</p>
            <button class="buy-btn" onclick="Engine.buy('bomb', 200)">شراء قنبلة (200💰)</button>
            <button class="buy-btn" onclick="Engine.buy('energy', 500)">شحن طاقة (500💰)</button>
        </div>
        <button class="btn-spawn" style="background:#333" onclick="UI.toggle('wallet-scr', false)">إغلاق</button>
    </div>

    <!-- FULL GRID ALERT -->
    <div id="full-modal" class="overlay" style="justify-content:center">
        <h2 style="color:var(--accent)">الشبكة ممتلئة!</h2>
        <button class="btn-spawn" style="width:150px" onclick="UI.toggle('full-modal', false)">فهمت</button>
    </div>

    <div id="ace-modal" class="overlay" style="justify-content:center;">
        <h1 style="color:var(--diamond)">اكتشاف ملكي! 💎</h1>
        <div id="ace-msg" style="margin:20px"></div>
        <button class="btn-spawn" onclick="Engine.aceChoice('sell')">بيع (200💰)</button>
        <button class="btn-spawn" style="margin-top:10px" onclick="Engine.aceChoice('keep')">احتفاظ</button>
    </div>

    <div id="proxy" class="proxy"></div>

    <!-- Scripts Loading -->
    <script src="gamebase.js"></script>
    <script src="main.js"></script>
</body>
</html>
