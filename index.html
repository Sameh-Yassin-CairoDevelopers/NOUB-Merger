<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Noub Royale Merger</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <!-- البار المقدس العلوي -->
    <div class="holy-bar">
        <div class="icon-btn diamond-btn" onclick="UI.toggleModal('diamond-scr', true)">💎<div class="badge" id="d-badge">0/13</div></div>
        <div class="icon-btn" onclick="UI.toggleModal('store-scr', true)">🏪</div>
        <div class="icon-btn" id="vault-btn" onclick="UI.toggleModal('vault-scr', true)">🏦 <div class="badge" id="v-badge">0</div></div>
        <div class="icon-btn" onclick="tg.showAlert('لوحة الصدارة قريباً')">🏆 <div class="badge" id="lvl-badge">1</div></div>
    </div>
    
    <div class="rank-display">الرتبة: <b id="rank-name">NOBLE</b><div id="lvl-fill"></div></div>

    <!-- منطقة اللعب -->
    <div class="game-zone">
        <div id="blast-layer" class="blast-effect"></div>
        <div class="grid" id="grid"></div>
    </div>

    <!-- بار التحكم -->
    <div class="control-bar">
        <div class="btn-util" id="trash-bin" onclick="Game.trash()">🗑️</div>
        <div class="btn-util" onclick="Game.fastCharge()" style="color:yellow">⚡<div class="badge" id="fc-badge">10</div></div>
        <div class="btn-util active-glow" id="bomb-btn" onclick="Game.useBomb()">💣<div class="badge" id="b-badge">2</div></div>
        <div class="btn-util active-glow" id="j-inv" onclick="Game.useJoker()">🃏<div class="badge" id="j-badge">3</div></div>
        <div class="btn-util" id="auto-btn" onclick="UI.toggleAuto()">🪄</div>
    </div>

    <div class="energy-meta">
        <span id="timer-txt">شحن: --:--</span> | <span id="energy-val">60/60 ⚡</span>
        <div class="energy-bar"><div id="energy-fill"></div></div>
    </div>

    <div class="footer">
        <button class="btn-spawn" onclick="Game.spawn()">إنشاء كارت (⚡1)</button>
    </div>

    <!-- المودالات -->
    <div id="vault-scr" class="overlay">
        <h2>الخزنة الملكية</h2>
        <div class="v-grid" id="v-grid"></div>
        <button id="return-btn" class="btn-spawn" style="display:none; background:var(--gold); color:#000; margin:15px" onclick="Game.returnFromVault()">إرجاع للشبكة</button>
        <button class="btn-spawn" style="width:120px; background:#444" onclick="UI.toggleModal('vault-scr', false)">إغلاق</button>
    </div>

    <div id="diamond-scr" class="overlay">
        <h2>الماسة الملكية</h2>
        <div class="diamond-svg-container"><svg viewBox="0 0 100 100" id="diamond-svg"></svg></div>
        <div class="ledger"><b>سجل الآص:</b><div id="ledger-items"></div></div>
        <button class="btn-spawn" style="width:120px" onclick="UI.toggleModal('diamond-scr', false)">العودة</button>
    </div>

    <div id="store-scr" class="overlay">
        <h2>المتجر الملكي</h2>
        <div class="store-card">
            <p>الذهب: <b id="gold-txt">600</b> 💰</p>
            <button class="buy-btn" onclick="Game.buy('bomb', 200)">قنبلة (200💰)</button>
            <button class="buy-btn" onclick="Game.buy('energy', 500)">طاقة كاملة (500💰)</button>
        </div>
        <button class="btn-spawn" style="background:#333" onclick="UI.toggleModal('store-scr', false)">إغلاق</button>
    </div>

    <div id="ace-modal" class="overlay" style="justify-content:center">
        <h1 style="color:var(--diamond)">🎉 آص ملكي جديد! 👑</h1>
        <p id="ace-msg"></p>
        <div style="display:flex; gap:10px; width:100%">
            <button class="btn-spawn" style="background:#444; flex:1" onclick="Game.aceChoice('sell')">بيع (200💰)</button>
            <button class="btn-spawn" style="flex:1" onclick="Game.aceChoice('keep')">احتفاظ</button>
        </div>
    </div>

    <div id="proxy" class="proxy"></div>

    <!-- تحميل الملفات البرمجية -->
    <script src="gamebase.js"></script>
    <script src="main.js"></script>
</body>
</html>
